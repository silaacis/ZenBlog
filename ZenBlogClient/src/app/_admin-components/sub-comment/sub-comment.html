<h3>Sub Comments</h3>

<table class="table table-bordered table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Email</th>
      <th>Comment</th>
      <th>Date</th>
      <th>Answered Comment</th>
      <th>Options</th>
    </tr>
  </thead>
<tbody>
  <tr *ngFor="let item of subComments; let i = index;">
    <th>{{i+1}}</th>
    <td>{{item.firstName}} {{item.firstName}}</td>
    <td>{{item.email}}</td>
    <td>{{item.body}}</td>
    <td>{{item.commentDate | date}}</td>
    <td>{{item.comment.body}}</td>
    <td>
      <button class="btn btn-outline-danger" (click)="deleteSubComment(item.id)"> <i class="fa fa-trash"></i>  </button>
    </td>
  </tr>
</tbody>
</table>
